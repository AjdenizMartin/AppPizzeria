<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pizzeria App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body id="body" class="transition">

<!-- ================= NAVBAR ================= -->
<div class="flex justify-between items-center p-4" id="navbar">

  <h1 class="text-xl font-bold">🍕 Pizzeria</h1>

  <button onclick="toggleTheme()" id="themeBtn"
  class="flex items-center gap-2 px-3 py-1 rounded border
         hover:bg-gray-200 dark:hover:bg-gray-700 transition">
  <span id="themeIcon">🌙</span>
  <span id="themeText">Dark</span>
</button>

</div>

<!-- ================= CATEGORIES ================= -->
<div id="categories"
  class="flex gap-3 overflow-x-auto px-4 mb-4"></div>

<!-- ================= MAIN ================= -->
<div class="flex">

  <!-- MENU -->
  <div id="menu" class="w-2/3 p-4"></div>

  <!-- CART -->
  <div id="cartPanel" class="w-1/3 p-4"></div>

</div>

<script>

// ================= STATE =================
let cart = [];
let darkMode = true;

// ================= THEME SYSTEM =================
function getTheme() {
  return darkMode
    ? {
        body: "bg-black text-white",
        card: "bg-gray-800 text-white",
        section: "text-white",
        button: "bg-gray-700 hover:bg-orange-500 text-white",
        panel: "bg-gray-900 text-white",
        input: "bg-gray-700 text-white"
      }
    : {
        body: "bg-gray-100 text-black",
        card: "bg-white text-black border",
        section: "text-black",
        button: "bg-gray-200 hover:bg-orange-400 text-black",
        panel: "bg-white text-black border",
        input: "bg-white text-black border"
      };
}

function applyTheme() {
  const theme = getTheme();

  const body = document.getElementById("body");
  const cart = document.getElementById("cartPanel");
  const navbar = document.getElementById("navbar");

  const icon = document.getElementById("themeIcon");
  const text = document.getElementById("themeText");

  body.className = theme.body + " transition";

  cart.className = "w-1/3 p-4 " + theme.panel;
  navbar.className = "flex justify-between items-center p-4 " + theme.panel;

  if (darkMode) {
    icon.innerText = "🌙";
    text.innerText = "Dark";
  } else {
    icon.innerText = "☀️";
    text.innerText = "Light";
  }
}

// ================= TOGGLE =================
function toggleTheme() {
  darkMode = !darkMode;
  applyTheme();
  loadProducts();
  renderCart();
}

// ================= LOAD PRODUCTS =================
async function loadProducts() {

  const res = await fetch("http://127.0.0.1:8000/products");
  const products = await res.json();

  const theme = getTheme();

  const menu = document.getElementById("menu");
  const categoriesDiv = document.getElementById("categories");

  menu.innerHTML = "";
  categoriesDiv.innerHTML = "";

  const categories = [...new Set(products.map(p => p.category))];

  // CATEGORY BUTTONS
  categories.forEach(cat => {

    const btn = document.createElement("button");

    btn.innerText = cat;

    btn.className = `
      px-4 py-2 rounded transition
      ${theme.button}
    `;

    btn.onclick = () => {
      document.getElementById(cat).scrollIntoView({
        behavior: "smooth"
      });
    };

    categoriesDiv.appendChild(btn);
  });

  // SECTIONS
  categories.forEach(cat => {

    const section = document.createElement("div");
    section.id = cat;

    section.innerHTML = `
      <h2 class="text-xl mt-6 mb-3 ${theme.section}">${cat}</h2>
      <div class="grid grid-cols-2 gap-4" id="section-${cat}"></div>
    `;

    menu.appendChild(section);
  });

  // PRODUCTS
  products.forEach(p => {

    const card = document.createElement("div");

    card.className = `
      ${theme.card}
      p-4 rounded
      hover:scale-105 hover:shadow-xl
      transition duration-200
    `;

    card.innerHTML = `
      <h3 class="font-bold">${p.name}</h3>
      <p class="text-sm opacity-70">${p.description || ""}</p>
      <p class="mt-2 font-semibold">€${p.price}</p>

      <button onclick="addToCart(${p.id}, '${p.name}', ${p.price})"
        class="bg-orange-500 px-3 py-1 rounded mt-2 hover:bg-orange-600">
        Add +
      </button>
    `;

    document.getElementById(`section-${p.category}`).appendChild(card);
  });

}

// ================= CART =================
function addToCart(id, name, price) {
  cart.push({ id, name, price });
  renderCart();
}

function renderCart() {

  const cartDiv = document.getElementById("cartPanel");
  const theme = getTheme();

  let total = 0;

  let html = `<h2 class="text-xl mb-4">🛒 Basket</h2>`;

  cart.forEach(item => {
    total += item.price;

    html += `
      <div class="flex justify-between mb-2">
        <span>${item.name}</span>
        <span>€${item.price}</span>
      </div>
    `;
  });

  html += `
    <p class="mt-4 font-bold">Total: €${total}</p>

    <button onclick="checkout()"
      class="bg-orange-500 w-full mt-4 py-2 rounded hover:scale-105 transition">
      Place Order
    </button>
  `;

  cartDiv.innerHTML = html;
}

// ================= CHECKOUT =================
async function checkout() {
  try {

    const res = await fetch("http://127.0.0.1:8000/create-checkout-session", {
      method: "POST"
    });

    const data = await res.json();

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert("Checkout error");
      console.log(data);
    }

  } catch (error) {
    console.error(error);
  }
}

// ================= INIT =================
applyTheme();
loadProducts();

</script>

</body>
</html>
