<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-6">

<h1 class="text-2xl mb-6">🍕 Admin Panel</h1>

<!-- =========================
CREATE PRODUCT
========================= -->
<div class="mb-6 bg-gray-800 p-4 rounded">

  <h2 class="mb-4 text-lg">Add Product</h2>

  <div class="flex flex-wrap gap-3">

    <input id="name" placeholder="Name"
      class="p-2 text-black rounded w-full md:w-64">

    <input id="price" placeholder="Price"
      type="number"
      class="p-2 text-black rounded w-full md:w-32">

    <input id="category" placeholder="Category"
      class="p-2 text-black rounded w-full md:w-64">

    <input id="description" placeholder="Description"
      class="p-2 text-black rounded w-full md:w-96">

    <input id="ingredients" placeholder="Ingredients (comma separated)"
      class="p-2 text-black rounded w-full md:w-96">

    <button onclick="createProduct()"
      class="bg-green-500 px-4 py-2 rounded hover:bg-green-600 transition">
      Add
    </button>

  </div>

</div>

<!-- =========================
PRODUCT LIST
========================= -->
<div id="products"></div>

<script>

// =========================
// LOAD PRODUCTS
// =========================
async function loadProducts() {
  const res = await fetch("http://127.0.0.1:8000/products");
  const products = await res.json();

  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p => {

    const div = document.createElement("div");

    div.className = "bg-gray-800 p-4 mb-3 rounded";

    div.innerHTML = `
      <div class="flex justify-between items-start">

        <div>
          <p class="font-bold">${p.name} (€${p.price})</p>
          <p class="text-sm opacity-70">${p.category}</p>
          <p class="text-sm mt-1">${p.description || ""}</p>
          <p class="text-xs mt-1 opacity-70">
            ${p.ingredients || ""}
          </p>
        </div>

        <button onclick="deleteProduct(${p.id})"
          class="bg-red-500 px-3 py-1 rounded hover:bg-red-600">
          Delete
        </button>

      </div>
    `;

    container.appendChild(div);
  });
}

// =========================
// CREATE PRODUCT
// =========================
async function createProduct() {

  const name = document.getElementById("name").value;
  const price = parseFloat(document.getElementById("price").value);
  const category = document.getElementById("category").value;
  const description = document.getElementById("description").value;
  const ingredients = document.getElementById("ingredients").value;

  if (!name || !price) {
    alert("Name and price are required");
    return;
  }

  await fetch("http://127.0.0.1:8000/admin/products", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name,
      price,
      category,
      description,
      ingredients
    })
  });

  // CLEAR INPUTS
  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("category").value = "";
  document.getElementById("description").value = "";
  document.getElementById("ingredients").value = "";

  loadProducts();
}

// =========================
// DELETE PRODUCT
// =========================
async function deleteProduct(id) {

  await fetch(`http://127.0.0.1:8000/admin/products/${id}`, {
    method: "DELETE"
  });

  loadProducts();
}

// =========================
// INIT
// =========================
loadProducts();

</script>

</body>
</html>
