name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check app tests migrations print_agent scripts

      - name: Run tests
        run: pytest -q

      - name: Validate Alembic heads
        run: |
          HEAD_COUNT=$(alembic heads | grep -c '(head)' || true)
          if [ "$HEAD_COUNT" -ne 1 ]; then
            echo "Expected exactly 1 Alembic head, got $HEAD_COUNT"
            alembic heads
            exit 1
          fi

      - name: Pre-deploy config validator (production rules)
        env:
          APP_ENV: production
          AUTO_CREATE_TABLES: "false"
          DATABASE_URL: postgresql://user:pass@localhost:5432/pizzeria_test
          FRONTEND_BASE_URL: https://example.com
          CORS_ORIGINS: https://example.com
          SECRET_KEY: test-secret-key-that-is-not-default
          STRIPE_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_test_dummy
          PRINT_AGENT_KEY: test-print-key
          ADMIN_EMAILS: owner@example.com
        run: python scripts/validate_predeploy.py

      - name: Smoke API locally
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 18000 &
          UVICORN_PID=$!
          sleep 3
          curl -fsS http://127.0.0.1:18000/health
          kill $UVICORN_PID

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
